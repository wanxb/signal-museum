<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旧信号博物馆 | Signal Museum</title>
  <meta name="description" content="把拨号音、CRT 扫描线、磁带峰值、伪未来雷达做成一座可独立部署的互动视觉展馆。" />
  <meta name="theme-color" content="#120f14" />
  <meta property="og:title" content="旧信号博物馆 | Signal Museum" />
  <meta property="og:description" content="拨号音、CRT 扫描线、磁带峰值与伪未来雷达组成的互动视觉展馆。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="eyebrow">Retro Media Exhibition</div>
        <h1>旧信号博物馆</h1>
        <p>把拨号音、扫描线、磁带峰值、CRT 余辉这些老媒介的气味，做成一座可互动的微型展馆。比工具更像展品，比展品更像情绪按钮。</p>
      </div>
      <div class="hero-side">
        <div class="note">点左侧切换展品，点“自动巡馆”让它自己轮播。</div>
        <a class="ghost-link" href="https://github.com/wanxb/signal-museum" target="_blank" rel="noopener noreferrer">GitHub 仓库</a>
      </div>
    </div>

    <div class="grid">
      <div class="panel list" id="list"></div>
      <div class="panel viewer">
        <canvas id="screen" width="900" height="320"></canvas>
        <div class="toolbar">
          <button id="playBtn">自动巡馆</button>
          <button id="captureBtn">保存一帧</button>
          <button id="shuffleBtn">随机展品</button>
        </div>
        <div class="desc">
          <h2 id="title"></h2>
          <div class="tags" id="tags"></div>
          <p id="body"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/scene.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
