<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>旧信号博物馆 | Signal Museum</title>
  <meta name="description" content="把拨号音、CRT 扫描线、磁带峰值、伪未来雷达做成一座可独立部署的互动视觉展馆。" />
  <meta name="theme-color" content="#120f14" />
  <meta property="og:title" content="旧信号博物馆 | Signal Museum" />
  <meta property="og:description" content="拨号音、CRT 扫描线、磁带峰值与伪未来雷达组成的互动视觉展馆。" />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="eyebrow">Retro Media Exhibition</div>
        <h1>旧信号博物馆</h1>
        <p>把拨号音、扫描线、磁带峰值、CRT 余辉这些老媒介的气味，做成一座可互动的微型展馆。比工具更像展品，比展品更像情绪按钮。</p>
      </div>
      <div class="hero-side">
        <div class="note">点左侧切换展品，点“自动巡馆”让它自己轮播。</div>
        <a class="icon-link" href="https://github.com/wanxb/signal-museum" target="_blank" rel="noopener noreferrer" aria-label="查看 GitHub 仓库" title="GitHub 仓库">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.59 2 12.24c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-.89-.01-1.75-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.67.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.27-.45-1.31.1-2.74 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.82c.85 0 1.7.12 2.5.36 1.9-1.33 2.74-1.05 2.74-1.05.55 1.43.2 2.47.1 2.74.65.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.23 10.23 0 0 0 22 12.24C22 6.59 17.52 2 12 2z"/>
          </svg>
        </a>
      </div>
    </div>

    <div class="grid">
      <div class="panel list" id="list"></div>
      <div class="panel viewer">
        <canvas id="screen" width="900" height="320"></canvas>
        <div class="toolbar">
          <button id="playBtn">自动巡馆</button>
          <button id="captureBtn">保存一帧</button>
          <button id="shuffleBtn">随机展品</button>
        </div>
        <div class="desc">
          <h2 id="title"></h2>
          <div class="tags" id="tags"></div>
          <p id="body"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/data.js"></script>
  <script src="./js/scene.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
